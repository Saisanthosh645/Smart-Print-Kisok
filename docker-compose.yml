version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartprintx
      POSTGRES_PASSWORD: smartprintx
      POSTGRES_DB: smartprintx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://smartprintx:smartprintx@postgres:5432/smartprintx
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      FRONTEND_URL: http://localhost:5173
      USE_LOCAL_STORAGE: "true"
      EMAIL_MOCK: "true"
      RAZORPAY_MOCK: "true"
    volumes:
      - ./Project/backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./Project/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
